# Task 1 – Nginx configuration for IMU CGI web server
# Deploy: sudo cp nginx_imu.conf /etc/nginx/sites-available/imu
#         sudo ln -s /etc/nginx/sites-available/imu /etc/nginx/sites-enabled/imu
#         sudo rm -f /etc/nginx/sites-enabled/default   # optional: disable default site
#         sudo systemctl reload nginx

server {
    listen 80;
    server_name _;           # match any hostname / IP

    # Serve static files from the standard web root
    root /var/www/html;
    index index.html index.htm;

    # ── CGI via fcgiwrap ────────────────────────────────────────────────────
    # fcgiwrap bridges nginx's FastCGI interface to classic CGI executables.
    # Install:  sudo apt install fcgiwrap
    # Enable:   sudo systemctl enable --now fcgiwrap
    location /cgi-bin/ {
        gzip off;

        # fcgiwrap socket (Raspbian/Raspberry Pi OS default path)
        fastcgi_pass  unix:/var/run/fcgiwrap.socket;
        include       fastcgi_params;

        # SCRIPT_FILENAME tells fcgiwrap which binary to execute.
        # Place compiled imu_cgi binary in /usr/lib/cgi-bin/
        fastcgi_param SCRIPT_FILENAME /usr/lib$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   /usr/lib;
    }

    # ── Convenience redirect: / → the CGI page ──────────────────────────────
    location = / {
        return 302 /cgi-bin/imu_cgi;
    }

    # ── Static assets fallthrough ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }
}
